<script>
    // Initial load
    DOM.loadSideBar_Glider(appState, ModuleDependencies["DOM"], DOM.displayDatasetInfo);
    
    // Hide loading screen after initial page load
    window.addEventListener('load', function() {
        setTimeout(DOM.hideLoadingScreen, 500); // Minimum loading time
    });
    
    document.getElementById("bannerButton1").addEventListener("click", function() {
        document.getElementById("avatar").click();
    });
    
    // File(s) inputed (added) — multi-file import via queue
    document.getElementById("avatar").addEventListener("change", function() {
    if (this.files.length > 0) {
        const files = Array.from(this.files);
        const fileInput = this; // Store reference to reset later
        let copiedCount = 0;
        const queueEntries = [];
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const destPath = path.join(pathDep.savedDataPath, file.name);
                    const result = fileHandle.copyFileToSavedDataViaBuffer(Buffer.from(e.target.result), file.name, pathDep.savedDataPath);
                    if (result.success) {
                        console.log("File copied to savedData:", result.destPath);
                        queueEntries.push({ fileName: file.name, destPath: destPath });
                    } else {
                        console.error("Error copying file to savedData:", result.error);
                    }
                } catch (err) {
                    console.error("Error saving file:", err);
                }
                copiedCount++;
                if (copiedCount === files.length) {
                    if (queueEntries.length === 0) return;
                    // Write all entries to the import queue file
                    queue.addToImportQeue(queueEntries);
                    console.log(`Import queue populated with ${queueEntries.length} file(s)`);
                    DOM.showLoadingScreen();
                    fileHandle.processImportQeue(appState, ModuleDependencies).then(() => {
                        console.log("All queued imports complete");
                        DOM.loadSideBar_Glider(appState, ModuleDependencies["DOM"], DOM.displayDatasetInfo);
                        fileInput.value = '';
                        DOM.hideLoadingScreen();
                    }).catch(error => {
                        console.error("Error processing import queue:", error);
                        DOM.hideLoadingScreen();
                        fileInput.value = '';
                    });
                }
            };
            reader.readAsArrayBuffer(file);
        });
    }
});

    document.getElementById("DeleteFileButton").addEventListener("click", async function() {
        const filesToDelete = Array.from(appState.selectedFiles);
        if (filesToDelete.length === 0) return;
        console.log(`Delete button clicked, ${filesToDelete.length} file(s) selected`);
        // Add all selected files to the remove queue
        queue.addToRemoveQeue(filesToDelete);
        console.log(`Remove queue populated with ${filesToDelete.length} file(s)`);
        DOM.showLoadingScreen();
        await fileHandle.processRemoveQeue(appState, ModuleDependencies["queue"]);
        appState.allFiles = fileHandle.listSavedDataFiles(
            pathDep.resolveToProperDataPath(__dirname, 'savedData'), 
            '.nc'
        );
        console.log('All queued deletions complete');
        DOM.dom_clearElementInnerHTML_UsingString("datasetInfoCardWrapper");
        DOM.dom_clearElementInnerHTML_UsingString('datasetAttrCardWrapper');
        DOM.dom_clearElementInnerHTML_UsingString('datasetVarsCardWrapper');
        DOM.dom_SetElementInnerHTML_UsingString("dataFileHeader", "(Click on a data file to view)");
        DOM.hideLoadingScreen();
});

    document.getElementById("backArrow").addEventListener("click", function() {
        let nextIndex;
        console.log("Back arrow clicked");
        if (Array.from(appState.selectedFiles).length === 0) {
            console.log("No file selected, ignoring back arrow click");
            return;
        } else {
            nextIndex = basicFunctions.getNextIndex(appState.currentFileIndexTarget, Array.from(appState.selectedFiles).length, 'back');
            appState.currentFileIndexTarget = nextIndex;
            console.log("Next index:", nextIndex);
            DOM.displayDatasetInfo(appState, ModuleDependencies["DOM"], Array.from(appState.selectedFiles)[appState.currentFileIndexTarget]);
        }
    });
    document.getElementById("forwardArrow").addEventListener("click", function() {
        let nextIndex;
        console.log("Forward arrow clicked");
        if (Array.from(appState.selectedFiles).length === 0) {
            console.log("No file selected, ignoring forward arrow click");
            return;
        } else {
            nextIndex = basicFunctions.getNextIndex(appState.currentFileIndexTarget, Array.from(appState.selectedFiles).length, 'forward');
            appState.currentFileIndexTarget = nextIndex;
            console.log("Next index:", nextIndex);
            DOM.displayDatasetInfo(appState, ModuleDependencies["DOM"], Array.from(appState.selectedFiles)[appState.currentFileIndexTarget]);
        }       
    });
</script>
