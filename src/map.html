<script>
    // Initial load
    DOM.loadSideBar_Glider(appState, ModuleDependencies["DOM"], DOM.displayDatasetInfo);

    DOM.updateVisibilityOfNotificationIndicator(appState);
    
    // Hide loading screen after initial page load
    window.addEventListener('load', function() {
        setTimeout(DOM.hideLoadingScreen, 500); // Minimum loading time
    });

    // init timeline display
    const rangeTable = document.querySelector('.rangeTable');
    const filterButton = document.getElementById('timelineFilterButton');
    const timeline = document.getElementById('timeline');
    if (rangeTable) rangeTable.style.display = 'none';
    if (filterButton) filterButton.style.display = 'none';
    if (timeline) timeline.style.display = '';
    
    document.getElementById("bannerButton1").addEventListener("click", function() {
        document.getElementById("avatar").click();
    });
    
    // File(s) inputed (added) — multi-file import via queue
    document.getElementById("avatar").addEventListener("change", function() {
    if (this.files.length > 0) {
        const files = Array.from(this.files);
        const fileInput = this; // Store reference to reset later
        let copiedCount = 0;
        const queueEntries = [];
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const destPath = path.join(pathDep.savedDataPath, file.name);
                    const result = fileHandle.copyFileToSavedDataViaBuffer(Buffer.from(e.target.result), file.name, pathDep.savedDataPath);
                    if (result.success) {
                        logging.log(params={
                            state:appState,
                            dep:ModuleDependencies["logging"],
                            callerInfo:basicFunctions.getCallerInfo(),
                            msgLabel: `File copied to savedData:`,
                            msg: `Destination: ${pathDep.savedDataPath},File: ${file.name}`,
                            seriousness: 'info',
                            code: '0000',
                            class:'FS',
                            ignoreConsole: false,
                            ignoreLogging: false
                        });
                        queueEntries.push({ fileName: file.name, destPath: destPath });
                    } else {
                        logging.log(params={
                            state:appState,
                            dep:ModuleDependencies["logging"],
                            callerInfo:basicFunctions.getCallerInfo(),
                            msgLabel: `Error copying file to savedData:`,
                            msg: result.error,
                            seriousness: 'warning',
                            code: '0000',
                            class:'FS',
                            ignoreConsole: false,
                            ignoreLogging: false,
                            ignorePopup: false,
                            ignoreNotification: false
                        });
                    }
                } catch (err) {
                    logging.log(params={
                            state:appState,
                            dep:ModuleDependencies["logging"],
                            callerInfo:basicFunctions.getCallerInfo(),
                            msgLabel: `Error saving file:`,
                            msg: err.message,
                            seriousness: 'warning',
                            code: '0000',
                            class:'FS',
                            ignoreConsole: false,
                            ignoreLogging: false,
                            ignorePopup: false,
                            ignoreNotification: false
                        });
                }
                copiedCount++;
                if (copiedCount === files.length) {
                    if (queueEntries.length === 0) return;
                    // Write all entries to the import queue file
                    queue.addToImportQeue(queueEntries);
                    DOM.showLoadingScreen();
                    fileHandle.processImportQeue(appState, ModuleDependencies).then(() => {
                        logging.log(params={
                            state:appState,
                            dep:ModuleDependencies["logging"],
                            callerInfo:basicFunctions.getCallerInfo(),
                            msgLabel: `Imports complete`,
                            msg: "All queued imports have been successfully processed.",
                            seriousness: 'info',
                            code: '0000',
                            class:'FS',
                            ignoreConsole: false,
                            ignoreLogging: false,
                            ignoreNotification: false, // TODO: This post never completes, probably a async issue.
                        });
                        DOM.loadSideBar_Glider(appState, ModuleDependencies["DOM"], DOM.displayDatasetInfo);
                        fileInput.value = '';
                        DOM.hideLoadingScreen();
                    }).catch(error => {
                        logging.log(params={
                            state:appState,
                            dep:ModuleDependencies["logging"],
                            callerInfo:basicFunctions.getCallerInfo(),
                            msgLabel: `Error processing import queue:`,
                            msg: error.message,
                            seriousness: 'warning',
                            code: '0000',
                            class:'FS',
                            ignoreConsole: false,
                            ignoreLogging: false,
                            ignorePopup: false,
                            ignoreNotification: false
                        });
                        DOM.hideLoadingScreen();
                        fileInput.value = '';
                    });
                }
            };
            reader.readAsArrayBuffer(file);
        });
    }
});

    }
    
    const date = new Date(inputOriginToUse[0]);

    if (isNaN(date.getTime())) {
        // The date is invalid (e.g., input was '')
    logging.log(params={
        callerInfo:basicFunctions.getCallerInfo(),
        state:appState,
        dep:ModuleDependencies["logging"],
        msgLabel: `NaN date for timeline after 12HR toggle`,
        msg: `Values: inputOriginToUse[0]: ${inputOriginToUse[0]}.`,
        seriousness: 'warning',
        code: '0000',
        class:'CALC',
        ignoreConsole: false,
        ignoreLogging: false
    });
    } else {
        let inputOriginToUse = null;
        if (dropdownValue === "option1"){
            inputOriginToUse = appState.mapTimelineRange.slider;
        } else if (dropdownValue === "option2"){
            inputOriginToUse = appState.mapTimelineRange.input;
        }
        logging.log(params={
            callerInfo:basicFunctions.getCallerInfo(),
            state:appState,
            dep:ModuleDependencies["logging"],
            msgLabel: `New Valid Date for timeline after 12HR toggle`,
            msg: `New Value: ${inputOriginToUse}`,
            seriousness: 'info',
            code: '0000',
            class:'CALC',
            ignoreConsole: false,
            ignoreLogging: false
        });

        document.getElementById('minTimelineRangeLabel').innerText = inputOriginToUse[0];
        document.getElementById('maxTimelineRangeLabel').innerText = inputOriginToUse[1];
    
        DOM.leaf_UpdateTimelineHeader(appState, inputOriginToUse[0], inputOriginToUse[1]);
    }
    
});

document.getElementById('markerFocusButton').addEventListener('click', function() {
userInteractions.userint_focusOnMarker(appState);
});
</script>
