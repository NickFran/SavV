<script>
    // Initial load
    DOM.loadSideBar_Glider(appState, ModuleDependencies["DOM"], DOM.displayDatasetInfo);
    
    // Hide loading screen after initial page load
    window.addEventListener('load', function() {
        setTimeout(DOM.hideLoadingScreen, 500); // Minimum loading time
    });
    
    document.getElementById("bannerButton1").addEventListener("click", function() {
        document.getElementById("avatar").click();
    });
    
    // File(s) inputed (added) — multi-file import via queue
    document.getElementById("avatar").addEventListener("change", function() {
    if (this.files.length > 0) {
        const files = Array.from(this.files);
        const fileInput = this; // Store reference to reset later
        
        // Step 1: Read all files into buffers, copy to savedData, and build queue entries
        let copiedCount = 0;
        const queueEntries = [];
        
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const destPath = path.join(pathDep.savedDataPath, file.name);
                    const result = fileHandle.copyFileToSavedDataViaBuffer(Buffer.from(e.target.result), file.name, pathDep.savedDataPath);
                    if (result.success) {
                        console.log("File copied to savedData:", result.destPath);
                        queueEntries.push({ fileName: file.name, destPath: destPath });
                    } else {
                        console.error("Error copying file to savedData:", result.error);
                    }
                } catch (err) {
                    console.error("Error saving file:", err);
                }
                
                copiedCount++;
                // Once all files are copied, populate the queue and start processing
                if (copiedCount === files.length) {
                    if (queueEntries.length === 0) return;
                    
                    // Write all entries to the import queue file
                    fileHandle.addToImportQeue(queueEntries);
                    console.log(`Import queue populated with ${queueEntries.length} file(s)`);
                    
                    DOM.showLoadingScreen();
                    
                    // Process the queue sequentially
                    processImportQeue().then(() => {
                        console.log("All queued imports complete");
                        DOM.loadSideBar_Glider(appState, ModuleDependencies["DOM"], DOM.displayDatasetInfo);
                        fileInput.value = '';
                        DOM.hideLoadingScreen();
                    }).catch(error => {
                        console.error("Error processing import queue:", error);
                        DOM.hideLoadingScreen();
                        fileInput.value = '';
                    });
                }
            };
            reader.readAsArrayBuffer(file);
        });
    }
});

    /**
     * Reads the import queue file and processes each entry one-by-one.
     * For each entry: opens in Python, gets overview, saves to JSON, creates map marker, then removes from queue.
     */
    async function processImportQeue() {
        const queue = fileHandle.readImportQeue();
        
        for (let i = 0; i < queue.length; i++) {
            const entry = queue[i];
            console.log(`Processing queue item ${i + 1}/${queue.length}: ${entry.fileName}`);
            DOM.setLoadingText(`Importing file ${i + 1} of ${queue.length}: ${entry.fileName}`);
            
            try {
                // Open the file in Python
                await integrations.callPyFunc('open', [entry.destPath], { timeoutMs: 120000 });
                console.log(`File loaded into memory: ${entry.fileName}`);
                
                // Get overview data
                const overview = await integrations.callPyFunc('getOverview');
                
                // Save to JSON
                await fileHandle.saveDatasetToJSON(ModuleDependencies["FileHandle"], entry.fileName, overview);
                
                // Create map marker if coordinates exist
                const coords = overview.coordinates;
                if (coords && coords[0] && coords[0].length > 0 && coords[1] && coords[1].length > 0) {
                    const lat = coords[0][0];
                    const lon = coords[1][0];
                    const popupContent = DOM.leaf_buildPopupContent(
                        entry.fileName, 
                        lat, 
                        lon, 
                        JSON.stringify(overview.dimensions)
                    );
                    DOM.leaf_insertDataMarker(appState, lat, lon, popupContent, {}, entry.fileName);
                    console.log(`Marker created for: ${entry.fileName}`);
                }
                
                // Remove processed entry from queue file
                fileHandle.markQeueEntryDone(entry.fileName);
                console.log(`Queue entry done: ${entry.fileName}`);
                
            } catch (error) {
                console.error(`Error processing ${entry.fileName}:`, error);
                // Mark as done to avoid getting stuck, but log the error
                fileHandle.markQeueEntryDone(entry.fileName);
            }
        }
    }

    document.getElementById("DeleteFileButton").addEventListener("click", async function() {
        let currentTargetFile = Array.from(appState.selectedFiles)[0];
        console.log("Delete button clicked= " + currentTargetFile);
        
        // Close the dataset in Python before deleting the file
        try {
            await integrations.callPyFunc('close');
            console.log("Dataset closed in Python");
        } catch (error) {
            console.error("Error closing dataset:", error);
        }
        
        // Remove from UI and data
        DOM.leaf_removeMapMarker(appState, currentTargetFile);
        DOM.dom_removeSidebarEntry(currentTargetFile);
        fileHandle.deleteEntryInSimpleData(currentTargetFile);
        fileHandle.deleteDataFile(currentTargetFile);
        appState.selectedFiles.delete(currentTargetFile);
        
        // Update allFiles list
        appState.allFiles = fileHandle.listSavedDataFiles(
            pathDep.resolveToProperDataPath(__dirname, 'savedData'), 
            '.nc'
        );
        console.log('File deleted and state updated');

        DOM.dom_clearElementInnerHTML_UsingString("datasetInfoCardWrapper");
        DOM.dom_clearElementInnerHTML_UsingString('datasetAttrCardWrapper');
        DOM.dom_clearElementInnerHTML_UsingString('datasetVarsCardWrapper');
        DOM.dom_SetElementInnerHTML_UsingString("dataFileHeader", "(Click on a data file to view)");
    });

</script>

<script>
    appState.map = L.map('map').setView([58.66764823678403, -37.95049416624507], 4);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(appState.map);

    const data = JSON.parse(fileHandle.getAllSimpleData());

    data.forEach(entry => {
        console.log("(Map Marker) for:"+ entry.fileName);
        let x = DOM.leaf_buildPopupContent(entry.fileName, entry.coords[0]["lat"], entry.coords[0]["lon"], JSON.stringify(entry.dims));
        DOM.leaf_insertDataMarker(appState, entry.coords[0]["lat"], entry.coords[0]["lon"], x, {}, entry.fileName);
    });
</script>
<script>
    x1 = fileHandle.getAllSimpleData();
        for (entry of JSON.parse(x1)) {
            // Reset array for each entry
            let coordPairArray = [];
            const firstPair = entry.coords[0];
            console.log(`File (first pair): ${entry.fileName}, Lat: ${firstPair.lat}, Lon: ${firstPair.lon}`);

            // Create group marker at first pair
            const groupMarker = L.marker([firstPair.lat, firstPair.lon]).bindPopup("Group Marker");

            // Add remaining coord pairs as markers
            for (coordPair of entry.coords.slice(1)) {
                console.log(`File: ${entry.fileName}, Lat: ${coordPair.lat}, Lon: ${coordPair.lon}`);
                coordPairArray.push(L.marker([coordPair.lat, coordPair.lon]));
            }

            // Group only this entry's markers
            const group = L.layerGroup([groupMarker, ...coordPairArray]);
            group.addTo(appState.map);
        }
</script>
